  <style>
    #sutrix-loader {
      position: fixed; inset: 0; z-index: 99999;
      background: #060A0A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #sutrix-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* Floating math particles canvas */
    #sutrix-canvas { position: absolute; inset: 0; }

    /* Central logo area */
    .sl-center {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
    }

    /* Rotating ring */
    .sl-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #00E5CC;
      border-right-color: #00E5CC44;
      animation: sl-spin 1s linear infinite;
      position: relative;
    }
    .sl-ring::before {
      content: '';
      position: absolute; inset: 8px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-bottom-color: #C090F5;
      border-left-color: #C090F544;
      animation: sl-spin-rev 1.4s linear infinite;
    }
    .sl-ring::after {
      content: '';
      position: absolute; inset: 18px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: #70D0F0;
      animation: sl-spin 2s linear infinite;
    }
    @keyframes sl-spin { to { transform: rotate(360deg); } }
    @keyframes sl-spin-rev { to { transform: rotate(-360deg); } }

    /* Icon inside ring */
    .sl-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      animation: sl-pulse 1.5s ease-in-out infinite;
    }
    @keyframes sl-pulse {
      0%,100% { transform: scale(1); opacity:1; }
      50% { transform: scale(1.12); opacity:0.8; }
    }

    /* Brand name */
    .sl-brand {
      font-family: 'Syne', monospace, sans-serif;
      font-size: 2.4rem; font-weight: 900;
      letter-spacing: 0.22em; text-transform: uppercase;
      background: linear-gradient(135deg, #00E5CC, #70D0F0, #C090F5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: sl-glow 2s ease-in-out infinite;
    }
    @keyframes sl-glow {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 12px #00E5CC88); }
    }

    /* Welcome text */
    .sl-welcome {
      font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 0.8rem; color: #527070;
      letter-spacing: 0.15em; text-transform: uppercase;
      animation: sl-fade-up 0.8s ease 0.3s both;
    }
    @keyframes sl-fade-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Progress bar */
    .sl-progress-track {
      width: 200px; height: 2px;
      background: #1A3535; border-radius: 2px; overflow: hidden;
      margin-top: 8px;
    }
    .sl-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00E5CC, #C090F5);
      border-radius: 2px;
      transition: width 0.15s ease;
      box-shadow: 0 0 8px #00E5CC88;
    }

    /* Status text */
    .sl-status {
      font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 0.58rem; color: #2A5555;
      letter-spacing: 0.08em; min-height: 16px;
      animation: sl-blink 0.8s ease-in-out infinite alternate;
    }
    @keyframes sl-blink {
      from { opacity: 0.5; } to { opacity: 1; }
    }
  </style>

  <div id="sutrix-loader">
    <canvas id="sutrix-canvas"></canvas>
    <div class="sl-center">
      <div class="sl-ring">
        <div class="sl-icon">∑</div>
      </div>
      <div style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div class="sl-welcome">Welcome to</div>
        <div class="sl-brand">Sutrix</div>
      </div>
      <div class="sl-progress-track">
        <div class="sl-progress-bar" id="sl-bar"></div>
      </div>
      <div class="sl-status" id="sl-status">Initializing engine…</div>
    </div>
  </div>

  <script>
  (function(){
    /* ── Canvas floating math particles ── */
    const canvas = document.getElementById('sutrix-canvas');
    const ctx = canvas.getContext('2d');
    const symbols = [
      'π','∞','∫','∂','∇','Σ','∏','√','α','β','γ','δ','λ','μ','φ','ω',
      'dx','dy','d²x','e','i','θ','ε','ζ','η','≈','≠','≤','≥','∈','∉',
      'f(x)','lim','log','sin','cos','tan','ln','C','R','N','Z','Q',
      '2.718','3.14','1.618','0','1','+','-','×','÷','=','↗','∆',
      'Ax=b','x²','xⁿ','∮','⊕','⊗','∧','∨','∀','∃','⊂','⊃',
    ];
    let W, H, particles = [];

    function resize(){
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a,b){ return a + Math.random()*(b-a); }

    // Create particles
    for(let i=0;i<55;i++){
      particles.push({
        x: rand(0,1), y: rand(0,1),
        vx: rand(-0.00012,0.00012), vy: rand(-0.00012,0.00012),
        sym: symbols[Math.floor(Math.random()*symbols.length)],
        size: rand(10,20),
        alpha: rand(0.04, 0.18),
        color: ['#00E5CC','#70D0F0','#C090F5','#F0C060','#527070'][Math.floor(Math.random()*5)],
        rot: rand(0, Math.PI*2),
        rotV: rand(-0.005,0.005),
      });
    }

    let running = true;
    function draw(){
      if(!running) return;
      ctx.clearRect(0,0,W,H);
      for(const p of particles){
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
        if(p.x<0) p.x=1; if(p.x>1) p.x=0;
        if(p.y<0) p.y=1; if(p.y>1) p.y=0;
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.font = `${p.size}px 'JetBrains Mono', monospace`;
        ctx.fillStyle = p.color;
        ctx.translate(p.x*W, p.y*H);
        ctx.rotate(p.rot);
        ctx.fillText(p.sym, 0, 0);
        ctx.restore();
      }
      requestAnimationFrame(draw);
    }
    draw();

    /* ── Progress & status ── */
    const bar = document.getElementById('sl-bar');
    const status = document.getElementById('sl-status');
    const icon = document.querySelector('.sl-icon');
    const iconFrames = ['∑','∫','π','∞','√','∂','≈','∇','φ','λ'];
    let iconIdx=0;
    const iconTimer = setInterval(()=>{
      iconIdx=(iconIdx+1)%iconFrames.length;
      icon.textContent = iconFrames[iconIdx];
    },400);

    const steps = [
      [0,   'Initializing engine…'],
      [15,  'Loading math modules…'],
      [30,  'Compiling expressions…'],
      [50,  'Building UI components…'],
      [65,  'Calibrating constants…'],
      [80,  'Rendering workspace…'],
      [92,  'Almost ready…'],
      [100, 'Welcome! ✓'],
    ];
    let si=0;
    function nextStep(){
      if(si>=steps.length) return;
      const [pct, msg] = steps[si++];
      bar.style.width = pct+'%';
      status.textContent = msg;
      if(si<steps.length){
        const delay = si===steps.length-1 ? 600 : rand(300,650);
        setTimeout(nextStep, delay);
      }
    }
    nextStep();

    /* ── Hide after 5s ── */
    setTimeout(()=>{
      running = false;
      clearInterval(iconTimer);
      const loader = document.getElementById('sutrix-loader');
      loader.classList.add('hidden');
      setTimeout(()=>{ loader.remove(); }, 800);
    }, 5000);
  })();
  </script>

.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);

  pointer-events: none;
  transition: opacity 0.28s;
  backdrop-filter: blur(2px);
}
.drawer-overlay.show { opacity: 1; pointer-events: all; }

.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;

  flex-direction: column;
  z-index: 50;

  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--sb-border, #1A2828);
  flex-shrink: 0;
}
.sidebar-logo {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--accent-glow);
  border: 1px solid var(--accent-color, #00E5CC)44;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-color, #00E5CC);
  font-size: 1rem; flex-shrink: 0;

}

/* ═══════════════════════════════════════════════════════════════════
   SECTION 9 — VECTOR TAB (full page)
═══════════════════════════════════════════════════════════════════ */
function VecTab() {
  const [dimStr,setDimStr]=useState("3");
  const dim=Math.min(Math.max(parseInt(dimStr)||2,2),4);
  const [A,setA]=useState(["1","2","3","0"]);
  const [B,setB]=useState(["4","5","6","0"]);
  const [op,setOp]=useState("dot");
  const [result,setResult]=useState(null);
  const [err,setErr]=useState("");
  const parseV=v=>v.slice(0,dim).map(x=>{const n=calcEval(x||"0");if(isNaN(n))throw new CalcError("Invalid component","Syntax");return n;});
  const compute=()=>{
    setErr(""); setResult(null);
    try {
      const VA=parseV(A),VB=parseV(B); let res,label;
      switch(op){
        case "dot":   res=vecDot(VA,VB);label="Dot product";break;
        case "cross": res=vecCross(VA,VB);label="Cross product";break;
        case "add":   res=VA.map((v,i)=>v+VB[i]);label="A + B";break;
        case "sub":   res=VA.map((v,i)=>v-VB[i]);label="A − B";break;
        case "magA":  res=vecMag(VA);label="|A|";break;
        case "magB":  res=vecMag(VB);label="|B|";break;

/* ═══════════════════════════════════════════════════════════════════
   SECTION 10 — CALCULUS TAB (full page)
═══════════════════════════════════════════════════════════════════ */
function CalcTab2() {
  const [mode,setMode]=useState("diff");
  const [expr,setExpr]=useState("sin(x)");
  const [xVal,setXVal]=useState("0");
  const [aVal,setAVal]=useState("0");
  const [bVal,setBVal]=useState("3.14159");
  const [isDeg,setIsDeg]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState("");
  const [steps,setSteps]=useState([]);

  const compute=()=>{
    setErr(""); setResult(null); setSteps([]);
    try {
      if (!expr.includes("x")) throw new CalcError("Expression must contain 'x'","Syntax");
      if (mode==="diff") {
        const x0=calcEval(xVal,isDeg);
        if (isNaN(x0)) throw new CalcError("Invalid x value","Syntax");
        const h=1e-7;
        const fx=calcEval(expr.replace(/(?<![a-zA-Z])x(?![a-zA-Z])/g,`(${x0})`),isDeg);
        const fxph=calcEval(expr.replace(/(?<![a-zA-Z])x(?![a-zA-Z])/g,`(${x0+h})`),isDeg);
        const fxmh=calcEval(expr.replace(/(?<![a-zA-Z])x(?![a-zA-Z])/g,`(${x0-h})`),isDeg);
        const deriv=(fxph-fxmh)/(2*h);
        setResult({value:deriv,label:`d/dx [f(x)] at x=${fmtNum(x0)}`});
        setSteps([
          {label:"Expression",val:expr},{label:"Point x₀",val:fmtNum(x0)},
          {label:"f(x₀)",val:fmtNum(fx)},{label:"f(x₀+h)",val:fmtNum(fxph)},
          {label:"f(x₀−h)",val:fmtNum(fxmh)},{label:"Method",val:"Central difference"},
          {label:"h",val:"1×10⁻⁷"},{label:"f′(x₀)",val:fmtNum(deriv)},
        ]);
      } else {
        const lo=calcEval(aVal,isDeg),hi=calcEval(bVal,isDeg);
        if (isNaN(lo)||isNaN(hi)) throw new CalcError("Invalid bounds","Syntax");
        if (lo>=hi) throw new CalcError("Upper bound must exceed lower","Domain");
        const n=10000;
        const integral=numericalIntegrate(expr,lo,hi,isDeg,n);
        setResult({value:integral,label:`∫[${fmtNum(lo)},${fmtNum(hi)}] f(x) dx`});
        setSteps([
          {label:"Expression",val:expr},{label:"Lower bound a",val:fmtNum(lo)},
          {label:"Upper bound b",val:fmtNum(hi)},{label:"Method",val:"Simpson's 1/3 Rule"},
          {label:"Subintervals n",val:String(n)},{label:"Step h",val:fmtNum((hi-lo)/n)},
          {label:"∫ f(x) dx",val:fmtNum(integral)},
        ]);
      }
    } catch(e){setErr(e instanceof CalcError?{msg:e.display,hint:e.hint}:{msg:"Error",hint:""});}
  };

  const examples=mode==="diff"
    ?[["sin(x)","0"],["x^3+2*x","1"],["ln(x)","1"],["cos(x)*exp(x)","0"]]
    :[["sin(x)","0","3.14159"],["x^2","0","3"],["exp(x)","0","1"],["1/x","1","2"]];

  return (
    React.createElement('div', { className: "page",}
      , React.createElement('div', { className: "tab-page",}
        , React.createElement('div', { className: "section-card", style: {background:T.surface,textAlign:"center"},}
          , React.createElement('div', { style: {fontFamily:"'Syne',sans-serif",fontSize:"1.4rem",fontWeight:800,color:T.purple,letterSpacing:"-0.02em",marginBottom:6},}, "∫ Numerical Calculus"  )
          , React.createElement('div', { style: {fontSize:"0.6rem",color:T.textDim,letterSpacing:"0.12em"},}, "DIFFERENTIATION · INTEGRATION"  )
        )

        /* Mode + DEG toggle */
        , React.createElement('div', { className: "section-card",}
          , React.createElement('div', { style: {display:"flex",gap:8,marginBottom:0},}
            , [{v:"diff",l:"d/dx  Derivative"},{v:"int",l:"∫  Integration"}].map(m=>(
              React.createElement('button', { key: m.v, onClick: ()=>{setMode(m.v);setResult(null);setSteps([]);setErr("");}, className: "tag", style: {
                flex:1, fontSize:"0.7rem", padding:"10px",
                borderColor:mode===m.v?T.purple:T.border, background:mode===m.v?T.purpleG:"transparent", color:mode===m.v?T.purple:T.textMid
              },}, m.l)
            ))
            , React.createElement('button', { onClick: ()=>setIsDeg(d=>!d), className: "tag", style: {
              borderColor:T.border, color:isDeg?T.amber:T.textMid, background:"transparent"
            },}, isDeg?"DEG":"RAD")
          )
        )

        /* Expression input */
        , React.createElement('div', { className: "section-card",}
          , React.createElement('div', { className: "section-title",}, "f(x) = Expression"  )
          , React.createElement('input', { value: expr, onChange: e=>setExpr(e.target.value),
            onFocus: e=>e.target.style.borderColor=T.purple, onBlur: e=>e.target.style.borderColor=T.border,
            className: "inp", placeholder: "e.g. sin(x^2) + ln(x)"   , style: {fontSize:"1.05rem",marginBottom:14},})
          , React.createElement('div', { style: {fontSize:"0.56rem",color:T.textDim,letterSpacing:"0.12em",marginBottom:8},}, "QUICK EXAMPLES" )
          , React.createElement('div', { className: "tag-row",}
            , examples.map((ex,i)=>(
              React.createElement('button', { key: i, onClick: ()=>{setExpr(ex[0]);if(mode==="diff"){setXVal(ex[1]);}else{setAVal(ex[1]);setBVal(ex[2]);} setResult(null);setSteps([]);}, className: "tag", style: {borderColor:T.border,background:"transparent",color:T.textMid},}
                , ex[0]
              )
            ))
          )
        )

        /* Parameters */
        , React.createElement('div', { className: "section-card",}
          , React.createElement('div', { className: "section-title",}, mode==="diff"?"Evaluation Point":"Integration Bounds")
          , mode==="diff"
            ? React.createElement('div', null
                , React.createElement('div', { style: {fontSize:"0.58rem",color:T.textMid,fontFamily:"'JetBrains Mono'",marginBottom:6},}, "x =" )
                , React.createElement('input', { value: xVal, onChange: e=>setXVal(e.target.value),
                  onFocus: e=>e.target.style.borderColor=T.purple, onBlur: e=>e.target.style.borderColor=T.border,
                  className: "inp", style: {maxWidth:200}, placeholder: "0",})
              )
            : React.createElement('div', { className: "grid-2",}
                , [[aVal,setAVal,"Lower bound a"],[bVal,setBVal,"Upper bound b"]].map(([v,sv,lbl])=>(
                  React.createElement('div', { key: lbl,}
                    , React.createElement('div', { style: {fontSize:"0.58rem",color:T.textMid,fontFamily:"'JetBrains Mono'",marginBottom:6},}, lbl)
                    , React.createElement('input', { value: v, onChange: e=>sv(e.target.value),
                      onFocus: e=>e.target.style.borderColor=T.purple, onBlur: e=>e.target.style.borderColor=T.border,
                      className: "inp",})
                  )
                ))
              )
          
        )

        , React.createElement(Ripple, { onClick: compute, style: {background:T.purple,color:"#fff",borderRadius:13,height:50,fontFamily:"'JetBrains Mono'",fontSize:"0.88rem",fontWeight:600,border:"none",letterSpacing:"0.1em",boxShadow:`0 0 24px ${T.purpleG}`,width:"100%"},}
          , mode==="diff"?"DIFFERENTIATE":"INTEGRATE"
        )

        , err && React.createElement(ErrBox, { err: err,})

        , result && (
          React.createElement('div', { className: "result-card",}
            , React.createElement('div', { style: {fontSize:"0.6rem",color:T.textDim,letterSpacing:"0.1em",marginBottom:6},}, result.label)
            , React.createElement('div', { className: "big-result", style: {color:T.purple,borderBottom:`1px solid ${T.border}`,paddingBottom:14,marginBottom:14},}
              , fmtNum(result.value)
            )
            , React.createElement('div', { style: {fontSize:"0.56rem",color:T.textDim,letterSpacing:"0.12em",marginBottom:10},}, "STEP-BY-STEP")
            , steps.map((s,i)=>(
              React.createElement('div', { key: i, className: "step-row",}
                , React.createElement('span', { className: "step-label",}, s.label)
                , React.createElement('span', { className: "step-val",}, s.val)
              )
            ))
          )
        )
      )
    )
  );
}
